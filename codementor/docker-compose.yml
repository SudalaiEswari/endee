

services:
  endee:
    image: endeeio/endee-server:latest
    ports:
      - "8081:8080"
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    volumes:
      - ./endee-data:/data
    restart: unless-stopped
    environment:
      - NDD_AUTH_TOKEN=${ENDEE_TOKEN:-}

